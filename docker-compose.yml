services:
  web:
    build: .
    container_name: appointment_web
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: appointment_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: appointment_redis
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: appointment_celery_worker
    command: celery -A project_appointment worker -l info
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    container_name: appointment_celery_beat
    command: celery -A project_appointment beat -l info
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - db
      - redis

  flower:
    build: .
    container_name: appointment_flower
    command: celery -A project_appointment flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker

volumes:
  postgres_data:
